name: Reusable Swift Quality

on:
  workflow_call:
    inputs:
      package-path:
        description: 'Path to the package (e.g., packages/health_connector_hk_ios)'
        type: string
        required: true
      macos-version:
        description: 'macOS runner version (e.g. macos-14, macos-15)'
        type: string
        required: false
        default: 'macos-15'
      xcode-version:
        description: 'Xcode version'
        type: string
        required: false
        default: '26'

permissions:
  contents: read

jobs:
  swift-quality:
    runs-on: ${{ inputs.macos-version }}
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: ${{ inputs.xcode-version }}

      - name: Cache Homebrew packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/Library/Caches/Homebrew
            ~/Library/Caches/Homebrew/downloads
          key: homebrew-${{ runner.os }}-${{ inputs.macos-version }}-swiftlint-swiftformat-${{ hashFiles('.github/workflows/_reusable-swift-quality.yaml') }}-v2
          restore-keys: |
            homebrew-${{ runner.os }}-swiftlint-swiftformat-

      - name: Install SwiftLint and SwiftFormat
        run: |
          brew install swiftlint swiftformat

      - name: Run SwiftLint
        working-directory: ${{ inputs.package-path }}/ios
        run: swiftlint lint --strict --baseline swiftlint-baseline.json

