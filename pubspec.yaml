name: health_connector_workspace
description: Monorepo for Health Connector Flutter plugin
publish_to: none

environment:
  sdk: ^3.9.2

workspace:
  - packages/health_connector
  - packages/health_connector/example
  - packages/health_connector_core
  - packages/health_connector_lint
  - packages/health_connector_logger
  - packages/health_connector_hc_android
  - packages/health_connector_hc_android/example
  - packages/health_connector_hk_ios
  - packages/health_connector_hk_ios/example
  - examples/health_connector_toolbox

dev_dependencies:
  melos: ^7.3.0

melos:
  name: health_connector
  repository: https://github.com/fam-tung-lam/health_connector
  sdkPath: .fvm/flutter_sdk

  command:
    bootstrap:
      environment:
        sdk: ^3.9.2
        flutter: '>=3.3.0'

      dependencies:
        meta: ^1.16.0

      dev_dependencies:
        pigeon: ^26.1.0
        test: ^1.24.0

    publish:
      hooks:
        pre: melos run analyze:strict

    version:
      # Only allow versioning to happen on main branch.
      branch: main

      # Generates a link to a prefilled GitHub release creation page.
      releaseUrl: true
      includeCommitId: true
      linkToCommits: true

      workspaceChangelog: false

      # Hooks to run before version commit
      hooks:
        preCommit: |
          melos run pigeon:generate
          melos run format

  scripts:
    # Analysis
    analyze:
      description: Run all static analysis (Dart, Swift, Kotlin)
      steps:
        - melos run analyze:dart
        - melos run analyze:swift
        - melos run analyze:kotlin

    analyze:strict:
      description: Run all static analysis with fatal warnings
      steps:
        - melos run analyze:dart:strict
        - melos run analyze:swift
        - melos run analyze:kotlin

    analyze:dart:
      description: Run dart analyze for all packages
      run: dart analyze .
      exec:
        concurrency: 5
        failFast: false
      packageFilters:
        dirExists: lib

    analyze:dart:strict:
      description: Run dart analyze with fatal warnings
      run: dart analyze --fatal-infos --fatal-warnings .
      exec:
        concurrency: 5
        failFast: true
      packageFilters:
        dirExists: lib

    analyze:swift:
      description: Analyze Swift code for the health_connector_hk_ios package
      run: cd packages/health_connector_hk_ios/ios && swiftlint lint .

    analyze:swift:deep:
      description: Deep Swift analysis with type-checked AST analyzer rules (slower)
      run: |
        cd packages/health_connector_hk_ios/ios/health_connector_hk_ios && \
        xcodebuild build-for-testing \
          -scheme health_connector_hk_ios \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          2>&1 | tee /tmp/xcodebuild.log && \
        cd .. && \
        swiftlint analyze --compiler-log-path /tmp/xcodebuild.log

    baseline:swift:
      description: Generate SwiftLint baseline
      run: cd packages/health_connector_hk_ios/ios && swiftlint lint --write-baseline swiftlint-baseline.json

    analyze:kotlin:
      description: Analyze Kotlin code for the health_connector_hc_android package
      run: cd packages/health_connector_hc_android/android && ./gradlew detekt

    baseline:kotlin:
      description: Generate Detekt baseline
      run: cd packages/health_connector_hc_android/android && ./gradlew detektBaseline

    # Code formatting
    format:
      description: Format all code (Dart, Swift, Kotlin)
      steps:
        - melos run format:dart
        - melos run format:swift
        - melos run format:kotlin

    format:check:
      description: Check all code formatting (Dart, Swift, Kotlin)
      steps:
        - melos run format:dart:check
        - melos run format:swift:check
        - melos run format:kotlin:check

    format:dart:
      description: Format all Dart code in the workspace
      run: dart format .
      exec:
        concurrency: 5
      packageFilters:
        dirExists: lib

    format:dart:check:
      description: Check Dart code formatting without making changes
      run: dart format --set-exit-if-changed .
      exec:
        concurrency: 5
        failFast: true
      packageFilters:
        dirExists: lib

    format:swift:
      description: Format Swift code for the health_connector_hk_ios package
      run: swiftformat packages/health_connector_hk_ios/ios

    format:swift:check:
      description: Check Swift code formatting without making changes
      run: swiftformat --lint packages/health_connector_hk_ios/ios

    format:kotlin:
      description: Format Kotlin code for the health_connector_hc_android package
      run: cd packages/health_connector_hc_android/android && ./gradlew ktlintFormat

    format:kotlin:check:
      description: Check Kotlin code formatting without making changes
      run: cd packages/health_connector_hc_android/android && ./gradlew ktlintCheck

    # Testing
    test:
      description: Run all Flutter tests in this project.
      run: melos run test:select --no-select
      packageFilters:
        dirExists: test

    test:select:
      description: Run Flutter tests for selected packages with test directories.
      run: flutter test
      exec:
        concurrency: 1
        failFast: false
      packageFilters:
        dirExists: test

    test:coverage:
      description: Generate coverage for the selected package.
      steps:
        - flutter test --coverage
        - genhtml coverage/lcov.info --output-directory=coverage/
      packageFilters:
        dirExists: test

    # Versioning and Publishing
    publish:dry-run:
      description: Test publishing packages without actually publishing to pub.dev
      run: melos publish --dry-run --no-private

    version:dry-run:
      description: Preview version changes and changelog updates without committing
      run: melos version --dry-run --no-private

    # Quality Checks
    pre-commit:
      description: Run all checks before committing (format, analyze, test)
      steps:
        - melos run format:check
        - melos run analyze:strict
        - melos run test

    # Build
    build:toolbox:
      description: Build the health_connector_toolbox app
      run: flutter build apk
      exec:
        concurrency: 1
      packageFilters:
        scope: "health_connector_toolbox"

    # Code generation
    pigeon:generate:
      description: Generate Pigeon platform channel code for Android and iOS packages
      steps:
        - melos exec --scope="health_connector_hc_android" -- dart run pigeon --input pigeons/health_connector_platform_api.dart
        - melos exec --scope="health_connector_hk_ios" -- dart run pigeon --input pigeons/health_connector_platform_api.dart
        - cd packages/health_connector_hk_ios && python3 scripts/add_public_keyword_to_swift_code.py ios/health_connector_hk_ios/Sources/health_connector_hk_ios/pigeon/HealthConnectorPlatformApi.g.swift

    # Clean
    clean:
      description: Clean build artifacts for all packages
      run: flutter clean
      exec:
        concurrency: 5
      packageFilters:
        flutter: true

    clean:deep:
      description: Deep clean including build artifacts and generated files
      steps:
        - melos clean
        - rm -rf **/.dart_tool
        - rm -rf **/build
        - rm -rf **/.flutter-plugins
        - rm -rf **/.flutter-plugins-dependencies

    # Dependencies
    get:
      description: Run `flutter pub get` for all packages
      run: flutter pub get
      exec:
        concurrency: 5
      packageFilters:
        dirExists: lib

    upgrade:
      description: Upgrade dependencies for all packages
      run: flutter pub upgrade
      exec:
        concurrency: 5
      packageFilters:
        dirExists: lib

  # IDE configuration
  ide:
    intellij:
      enabled: true
