name: 'Setup Flutter'
description: 'Setup Flutter SDK with caching'

inputs:
  flutter-version:
    description: 'Flutter version to install'
    required: false
    default: '3.35.7'
  channel:
    description: 'Flutter channel'
    required: false
    default: 'stable'

runs:
  using: 'composite'
  steps:
    - name: Setup Flutter
      uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2.21.0
      with:
        channel: ${{ inputs.channel }}
        flutter-version: ${{ inputs.flutter-version }}
        cache: true
        cache-key: flutter-${{ inputs.channel }}-${{ inputs.flutter-version }}-${{ hashFiles('**/pubspec.lock') }}
