dartdoc:
  # Category organization for sidebar navigation
  categories:
    "Getting Started":
      markdown: doc/topics/getting_started.md
    "Core API":
      markdown: doc/topics/core_api.md
    "Health Data Types":
      markdown: doc/topics/health_data_types.md
    "Health Records":
      markdown: doc/topics/health_records.md
    "Measurements & Units":
      markdown: doc/topics/measurement_units.md
    "Permissions":
      markdown: doc/topics/permissions.md
    "Exceptions":
      markdown: doc/topics/exceptions.md

  categoryOrder:
    - "Getting Started"
    - "Core API"
    - "Health Data Types"
    - "Health Records"
    - "Measurement Units"
    - "Permissions"
    - "Exceptions"

  # Hide internal implementation files
  nodoc:
    - "lib/src/**"

  # Hide categories with no documented members
  showUndocumentedCategories: false

  # GitHub source linking
  linkToSource:
    root: "."
    uriTemplate: "https://github.com/fam-tung-lam/health_connector/blob/main/packages/health_connector/%f%#L%l%"

  # Quality control - treat these as errors
  errors:
    - unresolved-doc-reference
    - broken-link

  warnings:
    - tool-error
