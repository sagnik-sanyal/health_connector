name: 'Setup CocoaPods Cache'
description: 'Restore CocoaPods cache for iOS builds'

inputs:
  podfile-path:
    description: 'Path to Podfile.lock for cache key scoping'
    required: false
    default: '**/Podfile.lock'

runs:
  using: 'composite'
  steps:
    - name: Restore CocoaPods cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          ~/Library/Caches/CocoaPods
          ~/.cocoapods
        key: cocoapods-${{ runner.os }}-${{ hashFiles(inputs.podfile-path) }}
        restore-keys: |
          cocoapods-${{ runner.os }}-
