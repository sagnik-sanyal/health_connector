# SwiftLint Configuration
# https://realm.github.io/SwiftLint/
# Updated: 2025-12 - 2025 Best Practices

# ============================================================
# EXCLUSIONS
# ============================================================
excluded:
  - '**/*.g.swift'          # Exclude all generated files
  - '**/.build/**'          # Exclude build artifacts
  - '**/DerivedSources/**'  # Exclude derived sources

# ============================================================
# OPT-IN RULES
# ============================================================
opt_in_rules:
  # === Performance ===
  - empty_count
  - contains_over_first_not_nil
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_string
  - first_where
  - last_where
  - reduce_into
  - sorted_first_last
  - flatmap_over_map_reduce

  # === Safety ===
  - force_unwrapping
  - implicitly_unwrapped_optional
  - identical_operands
  - discarded_notification_center_observer

  # === Code Quality ===
  - closure_body_length
  - closure_spacing
  - array_init
  - function_default_parameter_at_end
  - toggle_bool
  - yoda_condition

  # === Documentation ===
  - missing_docs
  - fatal_error_message
  - expiring_todo

# ============================================================
# ANALYZER RULES (require swiftlint analyze)
# ============================================================
analyzer_rules:
  - capture_variable
  - unused_declaration
  - unused_import

# ============================================================
# DISABLED RULES
# ============================================================
disabled_rules:
  - todo              # Allow TODO comments
  - line_length       # Handled by SwiftFormat
  - trailing_comma    # Conflicts with SwiftFormat --commas always

# ============================================================
# RULE CUSTOMIZATION - Metrics
# ============================================================

# Cyclomatic Complexity (ISO-2626 standard: ≤10)
cyclomatic_complexity:
  warning: 10
  error: 15
  ignores_case_statements: true  # Critical for DTO mapping switches

# Function Body Length
function_body_length:
  warning: 100
  error: 200  # Relaxed for gradual migration

# Type Body Length
type_body_length:
  warning: 300
  error: 500  # Accommodates HealthConnectorHkIosPlugin

# File Length
file_length:
  warning: 500
  error: 1200  # Migration path for HealthConnectorClient.swift

# Closure Body Length
closure_body_length:
  warning: 30
  error: 50

# Nesting Depth
nesting:
  type_level:
    warning: 2

# ============================================================
# RULE CUSTOMIZATION - Style
# ============================================================

# Match SwiftFormat --indent 4
indentation: 4

# Force Cast/Try Warnings
force_cast: warning
force_try: warning

# Safety rules - start as warnings for migration
force_unwrapping: warning
implicitly_unwrapped_optional: warning

# Identifier Naming
identifier_name:
  min_length:
    warning: 2  # Allow 'id', 'to', etc.
  max_length:
    warning: 50
  excluded:
    - id
    - db

# Function Parameter Count
function_parameter_count:
  warning: 5
  error: 8  # Allow complex initializers

# ============================================================
# REPORTER
# ============================================================
reporter: xcode
