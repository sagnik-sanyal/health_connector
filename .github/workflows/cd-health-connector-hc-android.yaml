name: CD - health_connector_hc_android

on:
  push:
    tags:
      - 'health_connector_hc_android-v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  security-events: write

  # Required for OIDC-based authentication to pub.dev (see _reusable-publish.yaml)
  # Must be explicitly granted at caller level even though reusable workflow declares it
  id-token: write

concurrency:
  group: cd-health_connector_hc_android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dart-quality:
    uses: ./.github/workflows/_reusable-dart-quality.yaml
    with:
      package-scope: health_connector_hc_android

  kotlin-quality:
    name: Kotlin Quality
    uses: ./.github/workflows/_reusable-kotlin-quality.yaml
    with:
      package-path: packages/health_connector_hc_android

  dart-tests:
    needs: dart-quality
    uses: ./.github/workflows/_reusable-dart-tests.yaml
    with:
      package-scope: health_connector_hc_android

  kotlin-tests:
    name: Kotlin Tests
    needs: kotlin-quality
    uses: ./.github/workflows/_reusable-kotlin-tests.yaml
    with:
      package-path: packages/health_connector_hc_android

  build-android:
    needs: [dart-tests, kotlin-tests]
    uses: ./.github/workflows/_reusable-build-android.yaml
    with:
      package-path: packages/health_connector_hc_android

  publish:
    needs: build-android
    uses: ./.github/workflows/_reusable-publish.yaml
    with:
      package-path: packages/health_connector_hc_android
